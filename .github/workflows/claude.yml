name: Claude with Custom App
on:
  push:
    branches:
      - master
  pull_request_target:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

jobs:
  claude-response:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        if: github.event_name == 'pull_request_target'
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Please review this pull request. Check for bugs, code quality issues,
            and anything that looks off. Post your findings as a PR review comment.
          additional_permissions: |
            mcp__github__create_pull_request_review: allow
            mcp__github__add_pull_request_review_comment: allow
            mcp__github__create_issue_comment: allow

      - uses: anthropics/claude-code-action@v1
        if: github.event_name != 'pull_request_target'
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
