name: Claude with Custom App
on:
  pull_request_target:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

jobs:
  claude-pr-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request_target'
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          show_full_output: true
          prompt: |
            Review the changes in PR #${{ github.event.pull_request.number }} in the repo ${{ github.repository }}.
            Do NOT use any slash commands.
            Use only Read, Glob, Grep, and Bash tools.
            Steps:
            1. Run: gh pr diff ${{ github.event.pull_request.number }} to see the changes
            2. Review the diff for bugs, quality issues, and Swiss Glass design adherence
            3. Post your findings with: gh pr comment ${{ github.event.pull_request.number }} --body "## Claude Review\n\n[your findings]"
          additional_permissions: |
            Bash(gh pr diff*): allow
            Bash(gh pr comment*): allow
            Bash(gh pr view*): allow

  claude-comment:
    runs-on: ubuntu-latest
    if: github.event_name == 'issue_comment'
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          show_full_output: true
